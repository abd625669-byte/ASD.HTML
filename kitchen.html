<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة طلبات المطبخ الحية</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            padding: 20px;
        }
        h1 { color: #ff9f43; text-align: center; }
        .orders-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .order-card {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            border-top: 5px solid #ff4757;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .order-table { font-size: 1.3rem; font-weight: bold; color: #ffca28; margin-bottom: 10px; }
        .order-time { font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

    <h1>شاشة استقبال طلبات المطبخ الحية 🍳</h1>
    <div class="orders-container" id="ordersGrid"></div>

    <script type="module">
        import { db, collection, onSnapshot, query, orderBy } from './data.js';

        const ordersGrid = document.getElementById('ordersGrid');
        
        // الاستماع الحقيقي للسيرفر: أي طلب يرسله الزبون يظهر هنا فوراً بدون تحديث الصفحة
        const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            ordersGrid.innerHTML = ""; // تنظيف الشاشة وعرض الطلبات المحدثة
            
            snapshot.forEach((doc) => {
                const order = doc.data();
                const orderTime = new Date(order.timestamp).toLocaleTimeString('ar-IQ');
                
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-table">طاولة رقم: ${order.tableNumber}</div>
                    <div>الطلب: <strong>${order.itemName}</strong></div>
                    <div class="order-time">الوقت: ${orderTime}</div>
                `;
                ordersGrid.appendChild(card);
            });
            
            if(snapshot.empty) {
                ordersGrid.innerHTML = "<p style='text-align:center; width:100%; color:#666;'>لا توجد طلبات واردة حالياً...</p>";
            }
        });
    </script>
</body>
</html>
